<!doctype html>
<html>
    <body>
        <script type="module">
            import init, {
                risk_level,
                risk_label,
                risk_desc,
                build_activity_bars,
            } from "./pkg/safely_extension.js";

            async function run() {
                await init();

                console.log(risk_level(22)); // should print: low
                console.log(risk_level(50)); // should print: caution
                console.log(risk_level(80)); // should print: high

                console.log("-------");

                console.log(risk_label("low"));
                console.log(risk_label("caution"));
                console.log(risk_label("high"));

                console.log("-------");

                console.log(risk_desc("low"));
                console.log(risk_desc("caution"));
                console.log(risk_desc("high"));

                console.log("-------");

                var activity = new Uint8Array([
                    4, 6, 8, 9, 7, 11, 10, 5, 9, 8, 12, 3,
                ]);
                var bars = build_activity_bars(activity);
                console.log(bars);
            }

            run();
        </script>
    </body>
</html>
